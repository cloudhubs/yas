app:
  security:
    rules:
      - patterns:
          - "/actuator/prometheus"
          - "/actuator/health/**"
          - "/swagger-ui"
          - "/swagger-ui/**"
          - "/error"
          - "/v3/api-docs/**"
        permit-all: true
      - patterns: 
          - "/storefront/**"
        roles: 
          - "CUSTOMER"
      - patterns: 
          - "/backoffice/**"
        roles: 
          - "ADMIN"
